<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
        # Restrict PHP file access to app root + temp dir + SSL certs (for SMTP TLS)
        # open_basedir blocks PHP's SSL stream from reading CA certificates outside this list
        php_admin_value open_basedir "/var/www/html:/tmp:/etc/ssl/certs:/etc/ssl"
    </Directory>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "0"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    Header always set X-Permitted-Cross-Domain-Policies "none"
    # API responses are JSON — a restrictive CSP prevents any accidental HTML rendering
    Header always set Content-Security-Policy "default-src 'none'"
</VirtualHost>
