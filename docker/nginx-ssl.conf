# ─────────────────────────────────────────────────────────────────────────────
# nginx-ssl.conf  —  HTTPS reverse proxy for Bookoholik
#
# Used by docker-compose.ssl.yml (Option A: self-signed / Option B: mkcert).
# This file is a template: ${NGINX_API_URL} and ${SSL_DOMAIN} are substituted
# at container start-up by the entrypoint of the ssl-proxy service.
#
# DO NOT use for plain-HTTP deployments — use docker-compose.yml instead.
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect all HTTP → HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ${SSL_DOMAIN};

    # ── TLS certificate paths (mounted as Docker volumes) ────────────────────
    ssl_certificate     /etc/ssl/certs/bookoholik.crt;
    ssl_certificate_key /etc/ssl/private/bookoholik.key;

    # ── TLS hardening ────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "geolocation=()"                      always;
    add_header X-Permitted-Cross-Domain-Policies "none"                        always;
    # CSP: allow connect-src to the backend origin (same host, /api path goes to backend)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' blob:; worker-src 'self' blob:;" always;

    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/wasm;

    # ── Backend API proxy (/api/* → backend container) ───────────────────────
    location /api/ {
        proxy_pass             http://backend:80;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto https;
        proxy_set_header       Connection        "";

        # Large file support (ebook uploads up to 100 MB + headroom)
        client_max_body_size   110M;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;
        proxy_request_buffering off;
    }

    # ── Frontend SPA proxy (everything else → frontend container) ────────────
    location / {
        proxy_pass           http://frontend:80;
        proxy_http_version   1.1;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto https;
        proxy_set_header     Connection        "";
    }
}
