server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # MIME types — nginx alpine doesn't map .mjs by default;
    # without this the PDF.js worker is served as application/octet-stream
    # and the browser refuses to load it as an ES module.
    include /etc/nginx/mime.types;
    types {
        application/javascript  mjs;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    # HSTS — tells browsers to only use HTTPS for 1 year.
    # Safe to include even on HTTP-only home servers; browsers ignore it over plain HTTP.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # blob: added to img-src  — required for cover images loaded as authenticated blob URLs
    # worker-src 'self' blob: — required for the PDF.js web worker (.mjs bundled locally)
    # 'unsafe-eval' in script-src — required by vue-i18n message compiler at runtime
    # ${NGINX_API_URL} — injected at build time via envsubst from Dockerfile.frontend NGINX_API_URL arg
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ${NGINX_API_URL} blob:; worker-src 'self' blob:;" always;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/wasm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets {
        # 1-year max-age for content-hashed assets, but WITHOUT immutable.
        # immutable would permanently lock in a wrong MIME type or other
        # header mistake across nginx config changes.
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        types {
            application/javascript  js mjs;
            application/wasm        wasm;
            text/css                css;
            image/jpeg              jpg jpeg;
            image/png               png;
            image/webp              webp;
            image/svg+xml           svg;
            font/woff2              woff2;
        }
    }
}
