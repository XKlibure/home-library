sonar.projectKey=bookoholik
sonar.projectName=Bookoholik
sonar.projectVersion=1.0.0

sonar.sources=backend/app,frontend/src
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/vendor/**,**/*.min.js,**/dist/**,**/*.lock

# PHP settings
sonar.php.file.suffixes=php

# JavaScript/Vue settings
sonar.javascript.file.suffixes=.js,.vue

# Coverage (optional - add later)
#sonar.php.coverage.reportPaths=coverage/clover.xml
#sonar.javascript.lcov.reportPaths=coverage/lcov.info
