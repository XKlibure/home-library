services:
  # PostgreSQL Database
  db:
    build:
      context: .
      dockerfile: docker/Dockerfile.db
    container_name: bookoholik_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-home_library}
      POSTGRES_USER: ${DB_USERNAME:-library_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    # ports:
      # Uncomment below ONLY for local development. Never expose in production.
      # - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - library_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-library_user} -d ${DB_DATABASE:-home_library}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHP Backend (Laravel-style API)
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: bookoholik_backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-home_library}
      DB_USERNAME: ${DB_USERNAME:-library_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    ports:
      - "${BACKEND_PORT:-8080}:80"
    volumes:
      - backups_data:/var/www/html/storage/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - library_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'

  # Vue.js Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${API_URL:-http://localhost:8080/api}
    container_name: bookoholik_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - library_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # Backup service (optional cron-based)
  backup:
    build:
      context: .
      dockerfile: docker/Dockerfile.backup
    container_name: bookoholik_backup
    restart: unless-stopped
    environment:
      PGHOST: db
      PGDATABASE: ${DB_DATABASE:-home_library}
      PGUSER: ${DB_USERNAME:-library_user}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - backups_data:/backups
    entrypoint: /bin/sh
    command: >
      -c "echo '0 2 * * * /usr/local/bin/backup.sh' | crontab - &&
          crond -f"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - library_network

volumes:
  postgres_data:
    driver: local
  backups_data:
    driver: local

networks:
  library_network:
    driver: bridge
